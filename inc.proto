syntax = "proto3";

package inc.core;

option go_package = "github.com/inc-lang/inc-protocol/gen/go;inccore";

// Bridge provides remote code execution for the INC language runtime.
// Clients send code and variables, and receive execution results including
// stdout/stderr output and a structured return value.
service Bridge {
  // CallStateless executes a single code block and returns the result.
  // Each request is independent with no shared state between calls.
  rpc CallStateless (ExecutionRequest) returns (ExecutionResponse);

  // CallStateful opens a bidirectional stream for executing multiple code blocks
  // that share state. Variables and definitions from earlier requests in the
  // stream are available to subsequent requests.
  rpc CallStateful (stream ExecutionRequest) returns (stream ExecutionResponse);
}

// ExecutionRequest contains the code and context for a single execution.
message ExecutionRequest {
  // Unique identifier for correlating requests with responses.
  string request_id = 1;
  // INC source code to execute.
  string code = 2;
  // Input variables available to the code during execution.
  map<string, Variable> variables = 3;
  // Runtime configuration such as resource limits (e.g., "memory_limit": "128M").
  map<string, string> config = 4;
}

// ExecutionResponse contains the outcome of a single code execution.
message ExecutionResponse {
  // Matches the request_id from the corresponding ExecutionRequest.
  string request_id = 1;
  // The return value of the executed code.
  Variable result = 2;
  // Captured standard output (e.g., from print/echo statements).
  string stdout = 3;
  // Captured standard error output.
  string stderr = 4;
  // Exit code: 0 indicates success, non-zero indicates an error.
  int32 exit_code = 5;
}

// Variable represents a dynamically-typed value in the INC language.
// It uses a oneof to encode the value's type and data.
message Variable {
  oneof kind {
    int64 int_val = 1;
    double float_val = 2;
    string string_val = 3;
    bool bool_val = 4;
    bytes binary_val = 5;
    ListValue list_val = 6;
    MapValue map_val = 7;
    NullValue null_val = 8;
  }
}

// ListValue holds an ordered sequence of Variables.
message ListValue {
  repeated Variable values = 1;
}

// MapValue holds a string-keyed collection of Variables.
message MapValue {
  map<string, Variable> pairs = 1;
}

// NullValue represents the absence of a value.
message NullValue {}